apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-payment-service
  template:
    metadata:
      labels:
        app: bank-payment-service
    spec:
      containers:
        - name: payment-service
          image: my-registry/bank-payment-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: bank-config
            - secretRef:
                name: bank-secret
          ports:
            - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: bank-payment-service
spec:
  ports:
    - port: 8083
  selector:
    app: bank-payment-service
