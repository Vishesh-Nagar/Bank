apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-api-gateway
  template:
    metadata:
      labels:
        app: bank-api-gateway
    spec:
      containers:
        - name: api-gateway
          # Replace with your actual Docker registry image
          image: my-registry/bank-api-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: bank-config
            - secretRef:
                name: bank-secret
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bank-api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: bank-api-gateway
