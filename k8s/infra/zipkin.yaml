apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-zipkin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-zipkin
  template:
    metadata:
      labels:
        app: bank-zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:latest
          ports:
            - containerPort: 9411
---
apiVersion: v1
kind: Service
metadata:
  name: bank-zipkin
spec:
  ports:
    - port: 9411
  selector:
    app: bank-zipkin
