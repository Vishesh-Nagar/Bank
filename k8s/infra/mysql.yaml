apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-mysql
  template:
    metadata:
      labels:
        app: bank-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            # We would typically use a ConfigMap for initialization scripts here, but for simplicity
            # we rely on the application to create tables (or standard Flyway/Liquibase).
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: bank-mysql
spec:
  ports:
    - port: 3306
  selector:
    app: bank-mysql
