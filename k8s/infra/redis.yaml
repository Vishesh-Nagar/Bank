apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-redis
  template:
    metadata:
      labels:
        app: bank-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: bank-redis
spec:
  ports:
    - port: 6379
  selector:
    app: bank-redis
