apiVersion: v1
kind: ConfigMap
metadata:
  name: bank-config
data:
  # Infrastructure
  DB_USERNAME: "root"
  REDIS_HOST: "bank-redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: "bank-kafka:29092"
  ZIPKIN_HOST: "bank-zipkin"
  
  # Service URLs (Internal DNS via Kubernetes Services)
  USER_SERVICE_URL: "http://bank-user-service:8081"
  ACCOUNT_SERVICE_URL: "http://bank-account-service:8082"
  PAYMENT_SERVICE_URL: "http://bank-payment-service:8083"
  NOTIFICATION_SERVICE_URL: "http://bank-notification-service:8084"
  API_GATEWAY_URL: "http://bank-api-gateway:8080"
  
  # Note: CORS_ALLOWED_ORIGINS is deliberately omitted here. It should be injected
  # into the Gateway deployment environment depending on the live deployment URL.

---
apiVersion: v1
kind: Secret
metadata:
  name: bank-secret
type: Opaque
stringData:
  # In a real production scenario, do not commit Secrets to version control.
  # Use SOPS, HashiCorp Vault, or External Secrets Operator.
  DB_PASSWORD: "CHANGE_ME_strong_password_here"
  JWT_SECRET: "CHANGE_ME_generate_a_64_char_hex_string"
  INTERNAL_SERVICE_SECRET: "CHANGE_ME_generate_another_64_char_hex_string"
