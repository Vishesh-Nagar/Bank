spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: true
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:bank-mysql-payments}:3306/bank_payments
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:bank-kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: ${REDIS_HOST:bank-redis}
      port: ${REDIS_PORT:6379}

payment:
  daily-limit: ${PAYMENT_DAILY_LIMIT:5000.00}

server:
  port: 8083

account-service:
  url: ${ACCOUNT_SERVICE_URL:http://bank-account-service:8082}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:my_internal_service_secret_key}

logging:
  level:
    org.apache.kafka: ERROR
  file:
    name: ${LOG_PATH:./logs}/${spring.application.name}.log
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
    instances:
      account-service:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://${ZIPKIN_HOST:bank-zipkin}:9411/api/v2/spans"

