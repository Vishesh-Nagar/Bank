spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:bank-mysql}:3306/bank_payments
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:bank-kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

server:
  port: 8083

account-service:
  url: http://bank-account-service:8082

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:my_internal_service_secret_key}

logging:
  level:
    org.apache.kafka: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
