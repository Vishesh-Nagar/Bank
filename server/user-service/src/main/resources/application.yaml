spring:
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/bank_users
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:mysecretkey1234567890123456789012}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
