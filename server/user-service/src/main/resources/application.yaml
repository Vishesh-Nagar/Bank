spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:bank-mysql}:3306/bank_users
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:my_super_secret_jwt_key_1234567890}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://localhost:3000}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:my_internal_service_secret_key}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
