spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:bank-kafka:29092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.bank.*"

server:
  port: 8084

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://localhost:3000}

logging:
  level:
    org.apache.kafka: ERROR
  file:
    name: ${LOG_PATH:./logs}/${spring.application.name}.log

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

