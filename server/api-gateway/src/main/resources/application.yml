spring:
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**, /api/users/login

        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**

        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payments/**

        - id: notification-ws
          uri: http://localhost:8084
          predicates:
            - Path=/ws/**

server:
  port: 8080
