spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        # Block all /internal/** paths — must be declared FIRST
        - id: block-internal
          uri: http://localhost:1  # unreachable dummy
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=404

        - id: user-login
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/users/login
            - Method=POST
          filters:
            - name: CustomRateLimiter
              args:
                windowSizeInSeconds: 60
                maxRequests: 10
                keyResolverBeanName: ipKeyResolver

        - id: user-general
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: CustomRateLimiter
              args:
                windowSizeInSeconds: 60
                maxRequests: 60
                keyResolverBeanName: ipKeyResolver

        - id: user-admin
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/admin/**, /api/v1/audit/**
          filters:
            - name: CustomRateLimiter
              args:
                windowSizeInSeconds: 60
                maxRequests: 20
                keyResolverBeanName: ipKeyResolver

        - id: account-service
          uri: http://bank-account-service:8082
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: CustomRateLimiter
              args:
                windowSizeInSeconds: 60
                maxRequests: 100
                keyResolverBeanName: ipKeyResolver

        - id: payment-service
          uri: http://bank-payment-service:8083
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: CustomRateLimiter
              args:
                windowSizeInSeconds: 60
                maxRequests: 20
                keyResolverBeanName: userKeyResolver

        - id: notification-ws
          uri: http://bank-notification-service:8084
          predicates:
            - Path=/ws/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:my_super_secret_jwt_key_1234567890}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://localhost:3000}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:my_internal_service_secret_key}

spring.data.redis:
  host: ${REDIS_HOST:bank-redis}
  port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://${ZIPKIN_HOST:bank-zipkin}:9411/api/v2/spans"

logging:
  file:
    name: ${LOG_PATH:./logs}/${spring.application.name}.log
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
