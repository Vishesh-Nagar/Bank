spring:
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        # Block all /internal/** paths — must be declared FIRST
        - id: block-internal
          uri: http://localhost:1  # unreachable dummy
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=404

        - id: user-login
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/users/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        - id: user-general
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 60
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"

        - id: user-admin
          uri: http://bank-user-service:8081
          predicates:
            - Path=/api/v1/admin/**, /api/v1/audit/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        - id: account-service
          uri: http://bank-account-service:8082
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        - id: payment-service
          uri: http://bank-payment-service:8083
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: notification-ws
          uri: http://bank-notification-service:8084
          predicates:
            - Path=/ws/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:my_super_secret_jwt_key_1234567890}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://localhost:3000}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:my_internal_service_secret_key}

spring.data.redis:
  host: ${REDIS_HOST:bank-redis}
  port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  file:
    name: ${LOG_PATH:./logs}/${spring.application.name}.log
