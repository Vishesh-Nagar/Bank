# ─── Bank Application — Full Stack Docker Compose ────────────────────────────
#
# Usage:
#   docker compose up -d                          → infrastructure only (MySQL, Redis, Kafka)
#   docker compose --profile backend up -d        → infra + all backend microservices
#   docker compose --profile full up -d           → infra + backend + client UI
#   docker compose up -d --build user-service     → rebuild & restart a single service
#
# Env:
#   Copy .env.example → .env and fill in secrets before first run.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  bank-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

# ─── Reusable environment block ─────────────────────────────────────────────
x-common-env: &common-env
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
  KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-bank-kafka:29092}
  REDIS_HOST: ${REDIS_HOST:-bank-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  ZIPKIN_HOST: ${ZIPKIN_HOST:-bank-zipkin}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:3000}

# ─── Reusable healthcheck for JVM services ───────────────────────────────────
x-jvm-healthcheck: &jvm-healthcheck
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 60s

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: bank-mysql
    restart: unless-stopped
    networks: [bank-net]
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bank-redis
    restart: unless-stopped
    networks: [bank-net]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: bank-zookeeper
    restart: unless-stopped
    networks: [bank-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bank-kafka
    restart: unless-stopped
    networks: [bank-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: bank-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bank-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: bank-zipkin
    restart: unless-stopped
    networks: [bank-net]
    ports:
      - "9411:9411"

  # ── Backend Microservices ───────────────────────────────────────────────────

  user-service:
    build:
      context: ./server
      dockerfile: user-service/Dockerfile
    image: bank-user-service:latest
    container_name: bank-user-service
    restart: unless-stopped
    networks: [bank-net]
    profiles: [backend, full]
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      <<: *jvm-healthcheck

  account-service:
    build:
      context: ./server
      dockerfile: account-service/Dockerfile
    image: bank-account-service:latest
    container_name: bank-account-service
    restart: unless-stopped
    networks: [bank-net]
    profiles: [backend, full]
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      <<: *jvm-healthcheck

  payment-service:
    build:
      context: ./server
      dockerfile: payment-service/Dockerfile
    image: bank-payment-service:latest
    container_name: bank-payment-service
    restart: unless-stopped
    networks: [bank-net]
    profiles: [backend, full]
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account-service:
        condition: service_healthy
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      <<: *jvm-healthcheck

  notification-service:
    build:
      context: ./server
      dockerfile: notification-service/Dockerfile
    image: bank-notification-service:latest
    container_name: bank-notification-service
    restart: unless-stopped
    networks: [bank-net]
    profiles: [backend, full]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      <<: *jvm-healthcheck

  api-gateway:
    build:
      context: ./server
      dockerfile: api-gateway/Dockerfile
    image: bank-api-gateway:latest
    container_name: bank-api-gateway
    restart: unless-stopped
    networks: [bank-net]
    profiles: [backend, full]
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      <<: *jvm-healthcheck

  # ── Frontend ────────────────────────────────────────────────────────────────

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: bank-client:latest
    container_name: bank-client
    restart: unless-stopped
    networks: [bank-net]
    profiles: [full]
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
